name: CI

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]

env:
  AZURE_FUNCTIONAPP_NAME: maxiumdoorsFunctionApp
  DOTNET_VERSION: '8.0.x'
  FUNCTION_PROJECT: ./MaxiumDoorsFunctionApp/MaxiumDoorsFunctionApp.csproj
  PUBLISH_DIR: ./publish

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore ${{ env.FUNCTION_PROJECT }}

      - name: Build
        run: dotnet build ${{ env.FUNCTION_PROJECT }} --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --verbosity normal

      - name: Publish
        run: dotnet publish ${{ env.FUNCTION_PROJECT }} --configuration Release -o ${{ env.PUBLISH_DIR }}

      - name: Show published files
        run: ls -R ${{ env.PUBLISH_DIR }}

      - name: Upload published artifact
        uses: actions/upload-artifact@v4
        with:
          name: published-function
          path: ${{ env.PUBLISH_DIR }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: published-function
          path: ${{ env.PUBLISH_DIR }}

      - name: Show downloaded files
        run: ls -R ${{ env.PUBLISH_DIR }}

      - name: Deploy to Azure Function App
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          package: ${{ env.PUBLISH_DIR }}
          publish-profile: ${{ secrets.MAXIUMDOORSFUNCAPPSECRET }}

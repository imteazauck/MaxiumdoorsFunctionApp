name: Deploy (develop)

on:
  push:
    branches:
      - develop

concurrency:
  group: develop-deploy
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: develop

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore ./MaxiumDoorsFunctionApp.csproj

      - name: Build
        run: dotnet build ./MaxiumDoorsFunctionApp.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish ./MaxiumDoorsFunctionApp.csproj --configuration Release --no-build -o publish_output

      - name: Show deployed metadata candidate
        run: |
          echo "=== functions.metadata ==="
          cat publish_output/functions.metadata
          echo ""
          echo "=== files ==="
          find publish_output -maxdepth 2 -type f | sort

      - name: Deploy to Azure Function App
        uses: Azure/functions-action@v1
        with:
          app-name: maxiumdoorsFunctionApp
          package: publish_output
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
